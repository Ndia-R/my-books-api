spring:
  application:
    name: my-books-api

  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
        hbm2dll:
          create_namespaces: true
    hibernate:
      ddl-auto: update
    open-in-view: false

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DATASOURCE_POOL_MAX_SIZE:10}
      minimum-idle: ${DATASOURCE_POOL_MIN_IDLE:5}
      connection-timeout: ${DATASOURCE_CONNECTION_TIMEOUT:30000}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Identity Providerの発行者URI（JWTの"iss"クレーム検証 + JWK Set自動検出）
          issuer-uri: ${IDP_ISSUER_URI}

# ============================================
# Server Configuration
# ============================================
server:
  # X-Forwarded-Protoヘッダーを使用して元のプロトコルを認識する
  # （リバースプロキシ元がHTTPS通信ならHTTPS通信と認識するため）
  forward-headers-strategy: native
  # エラーレスポンス設定（本番環境ではセキュリティのため非表示推奨）
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:never}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:never}

# ============================================
# Application Configuration
# ============================================
app:
  # Pagination Settings
  pagination:
    max-limit: 1000
    default-limit: 20
    max-genre-ids: 50
    max-book-id-length: 255

  # API version
  api:
    version: ${APP_API_VERSION:v1}

  # Swagger
  swagger:
    server:
      url: ${APP_SWAGGER_SERVER_URL:/}
      description: ${APP_SWAGGER_SERVER_DESCRIPTION:Development Server}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
    # Swagger UI OAuth2 設定
    oauth:
      client-id: swagger-ui-client
      use-pkce-with-authorization-code-grant: true
      scopes: openid,profile,email

# ============================================
# Logging Configuration
# ============================================
logging:
  level:
    root: ${LOG_LEVEL}
    # Spring Security関連のログ
    org.springframework.security: ${LOG_LEVEL_SECURITY}
    org.springframework.security.oauth2: ${LOG_LEVEL_SECURITY}

# ============================================
# 権限セットと単一権限のマッピング
# ============================================
permission-sets:
  mappings:
    # 一般ユーザー（デフォルト）
    general-user:
      - favorite:manage:own       # お気に入り管理
      - bookmark:read:own         # ブックマーク閲覧
      - review:read:any           # レビュー閲覧
      - user:read:own             # プロフィール閲覧
      - user:update:own           # プロフィール編集
    
    # プレミアムユーザー
    premium-user:
      - book-content:read:any     # 有料コンテンツ閲覧
      - favorite:manage:own       # お気に入り管理
      - bookmark:manage:own       # ブックマーク管理
      - review:read:any           # レビュー閲覧
      - review:manage:own         # レビュー管理
      - user:read:own             # プロフィール閲覧
      - user:update:own           # プロフィール編集
    
    # コンテンツ編集者
    content-editor:
      - book:manage:any           # 書籍管理（作成・編集・削除）
      - genre:manage:any          # ジャンル管理
    
    # コミュニティ管理者
    moderator:
      - review:read:any           # レビュー閲覧
      - review:delete:any         # すべてのレビュー削除
