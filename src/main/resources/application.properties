spring.application.name=my-books-backend

spring.jpa.properties.hibernate.hbm2dll.create_namespaces=true
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# X-Forwarded-Protoヘッダーを使用して元のプロトコルを認識する
# （リバースプロキシ元がHTTPS通信ならHTTPS通信と認識するため）
server.forward-headers-strategy=native

# DB
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pagination Settings
app.pagination.max-limit=1000
app.pagination.default-limit=20
app.pagination.max-genre-ids=50
app.pagination.max-book-id-length=255

# API version
app.api.version=${APP_API_VERSION:v1}

# Swagger
app.swagger.server.url=${APP_SWAGGER_SERVER_URL:/}
app.swagger.server.description=${APP_SWAGGER_SERVER_DESCRIPTION:Development Server}

springdoc.swagger-ui.config-url=${SPRINGDOC_SWAGGER_UI_CONFIG_URL:/v3/api-docs/swagger-config}
springdoc.swagger-ui.url=${SPRINGDOC_SWAGGER_UI_URL:/v3/api-docs}
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.com.example.my_books_backend=${LOGGING_LEVEL:DEBUG}

# OAuth2 Resource Server
# issuer-uri: JWTトークンの"iss"クレーム検証に使用（ブラウザからアクセスするURL）
# jwk-set-uri: JWKS取得に使用（コンテナ間通信用URL）
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:9000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:9000/.well-known/jwks.json}

# CORS設定
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# Demo User ID（OAuth2移行後は削除予定）
app.demo.user.id=4