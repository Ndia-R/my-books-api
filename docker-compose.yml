services:
  my-books-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ./db/book_chapter_page_contents.csv:/docker-entrypoint-initdb.d/book_chapter_page_contents.csv
      - ./db/book_favorites.csv:/docker-entrypoint-initdb.d/book_favorites.csv
      - ./db/book_genres.csv:/docker-entrypoint-initdb.d/book_genres.csv
      - ./db/book_reviews.csv:/docker-entrypoint-initdb.d/book_reviews.csv
      - ./db/books.csv:/docker-entrypoint-initdb.d/books.csv
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/my.cnf:/etc/mysql/conf.d/my.cnf
      - my-books-db-data:/var/lib/mysql
    networks:
      - vsv-emerald-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: --secure-file-priv=/docker-entrypoint-initdb.d

  my-books-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Tokyo
      # Database Configuration
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Identity Provider (IdP) Configuration
      IDP_ISSUER_URI: ${IDP_ISSUER_URI}
      # JPA Settings
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-true}
      SPRING_JPA_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL:-true}
      # DataSource Pool Settings
      DATASOURCE_POOL_MAX_SIZE: ${DATASOURCE_POOL_MAX_SIZE:-10}
      DATASOURCE_POOL_MIN_IDLE: ${DATASOURCE_POOL_MIN_IDLE:-5}
      DATASOURCE_CONNECTION_TIMEOUT: ${DATASOURCE_CONNECTION_TIMEOUT:-30000}
      # Error Response Settings
      SERVER_ERROR_INCLUDE_MESSAGE: ${SERVER_ERROR_INCLUDE_MESSAGE:-always}
      SERVER_ERROR_INCLUDE_STACKTRACE: ${SERVER_ERROR_INCLUDE_STACKTRACE:-always}
      # Logging Settings
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    volumes:
      - .:/workspace
      - gradle-cache:/home/vscode/.gradle
      - claude-config:/home/vscode/.claude
      - gemini-config:/home/vscode/.gemini
    networks:
      - vsv-emerald-network
    depends_on:
      my-books-db:
        condition: service_healthy
    command: sleep infinity

volumes:
  my-books-db-data:
  gradle-cache:
  claude-config:
  gemini-config:

networks:
  vsv-emerald-network:
    external: true